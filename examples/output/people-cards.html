<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>json_presenter output</title>
    <style>


:root {
    --jp-bg: #fff4e8;
    --jp-surface: #fffaf5;
    --jp-surface-soft: #fde7d3;
    --jp-text: #4b2e1f;
    --jp-title: #7c2d12;
    --jp-muted: #8b5e3c;
    --jp-key: #9a3412;
    --jp-value: #3b2418;
    --jp-border: #e7b48f;
    --jp-font-family: Georgia, serif;
    --jp-radius: 16px;
    --jp-shadow: 0 12px 30px rgba(124, 45, 18, 0.16);

    --jp-space-sm: 0.5rem;
    --jp-space-md: 1rem;
    --jp-space-lg: 1.5rem;
    --jp-space-xl: 2.5rem;
}



.jp-root {
    min-height: 100vh;
    box-sizing: border-box;
    padding: var(--jp-space-xl);
    font-family: var(--jp-font-family);
    color: var(--jp-text);
    background: var(--jp-bg);
}

/* ==========================================
   Layout Primitives
   ========================================== */

.jp-stack {
    display: flex;
    flex-direction: column;
    gap: var(--jp-space-lg);
}

.jp-row {
    display: flex;
    flex-direction: row;
    gap: var(--jp-space-md);
}

.jp-grid {
    display: grid;
    gap: var(--jp-space-lg);
}

.jp-center {
    display: flex;
    justify-content: center;
    align-items: center;
}

.jp-scroll-x {
    overflow-x: auto;
}

.jp-document-header {
    max-width: 960px;
    margin: 0 auto var(--jp-space-xl);
}

.jp-document-title {
    margin: 0;
    font-size: 2.25rem;
    line-height: 1.1;
    color: var(--jp-title);
}

.jp-document-subtitle {
    margin: var(--jp-space-sm) 0 0;
    font-size: 1rem;
    color: var(--jp-muted);
}

.jp-document-description {
    margin: var(--jp-space-md) 0 0;
    max-width: 720px;
    line-height: 1.6;
    color: var(--jp-text);
}

.jp-content {
    max-width: 960px;
    margin: 0 auto;
}

.jp-card {
    border: 1px solid var(--jp-border);
    border-radius: var(--jp-radius);
    background: var(--jp-surface);
    box-shadow: var(--jp-shadow);
    overflow: hidden;
}

.jp-card-title {
    margin: 0;
    padding: var(--jp-space-lg);
    font-size: 1.25rem;
    color: var(--jp-title);
    border-bottom: 1px solid var(--jp-border);
}

.jp-card-fields {
    display: grid;
}

.jp-card-field {
    display: grid;
    grid-template-columns: minmax(120px, 220px) 1fr;
    gap: var(--jp-space-md);
    padding: var(--jp-space-md) var(--jp-space-lg);
    border-bottom: 1px solid var(--jp-border);
}

.jp-card-field:last-child {
    border-bottom: none;
}

.jp-card-key {
    font-weight: 700;
    color: var(--jp-key);
}

.jp-card-value {
    color: var(--jp-value);
    overflow-wrap: anywhere;
}

.jp-table {
    width: 100%;
    border-collapse: collapse;
    border: 1px solid var(--jp-border);
    border-radius: var(--jp-radius);
    background: var(--jp-surface);
    box-shadow: var(--jp-shadow);
    overflow: hidden;
}

.jp-table th,
.jp-table td {
    padding: var(--jp-space-md);
    border-bottom: 1px solid var(--jp-border);
    text-align: left;
}

.jp-table th {
    color: var(--jp-title);
    background: var(--jp-surface-soft);
}

.jp-table tr:last-child td {
    border-bottom: none;
}

.jp-tree {
    margin: var(--jp-space-sm) 0 0 var(--jp-space-lg);
    padding-left: var(--jp-space-md);
    border-left: 1px solid var(--jp-border);
}

.jp-tree li {
    margin: var(--jp-space-sm) 0;
}

.jp-tree-label {
    display: inline-block;
    padding: 0.25rem 0.5rem;
    border-radius: calc(var(--jp-radius) / 2);
    background: var(--jp-surface-soft);
    color: var(--jp-text);
}

.jp-card-field-nested,
.jp-card-field-collection {
    align-items: start;
}

.jp-disclosure {
    width: 100%;
}

.jp-disclosure-summary {
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: var(--jp-space-sm);
    padding: 0.4rem 0.75rem;
    border: 1px solid var(--jp-border);
    border-radius: calc(var(--jp-radius) / 2);
    background: var(--jp-surface-soft);
    color: var(--jp-key);
    font-weight: 700;
    list-style: none;
    transition:
        background 0.2s ease,
        transform 0.2s ease;
}

.jp-disclosure-summary:hover {
    background: var(--jp-surface);
    transform: translateY(-1px);
}

.jp-disclosure-summary::-webkit-details-marker {
    display: none;
}

.jp-disclosure-summary::before {
    content: "▸";
    display: inline-block;
    transition: transform 0.2s ease;
}

.jp-disclosure[open] .jp-disclosure-summary::before {
    transform: rotate(90deg);
}

.jp-disclosure-content {
    margin-top: var(--jp-space-md);
    padding-left: var(--jp-space-md);
    border-left: 2px solid var(--jp-border);
}

.jp-disclosure-content .jp-card {
    box-shadow: none;
    border-style: dashed;
}

.jp-collection-item {
    padding: 0.65rem 0.85rem;
    border: 1px solid var(--jp-border);
    border-radius: calc(var(--jp-radius) / 2);
    background: var(--jp-surface-soft);
}


    </style>
</head>
<body>
    <main class="jp-root">

        
        <header class="jp-document-header">
            <h1 class="jp-document-title">JSON Collection</h1>
            <p class="jp-document-subtitle">3 items</p>
            <p class="jp-document-description">Collection presented as semantic cards.</p>
        </header>
        
        <section class="jp-content jp-stack">
            
        <section class="jp-card">
            <h2 class="jp-card-title">Alice Tanaka</h2>
            <div class="jp-card-fields">
                
        <div class="jp-card-field">
            <span class="jp-card-key">Name</span>
            <span class="jp-card-value">Alice Tanaka</span>
        </div>
        

        <div class="jp-card-field">
            <span class="jp-card-key">Role</span>
            <span class="jp-card-value">Machine Learning Engineer</span>
        </div>
        

        <div class="jp-card-field">
            <span class="jp-card-key">Country</span>
            <span class="jp-card-value">Japan</span>
        </div>
        
            </div>
        </section>
        

        <section class="jp-card">
            <h2 class="jp-card-title">Bob Smith</h2>
            <div class="jp-card-fields">
                
        <div class="jp-card-field">
            <span class="jp-card-key">Name</span>
            <span class="jp-card-value">Bob Smith</span>
        </div>
        

        <div class="jp-card-field">
            <span class="jp-card-key">Role</span>
            <span class="jp-card-value">Data Scientist</span>
        </div>
        

        <div class="jp-card-field">
            <span class="jp-card-key">Country</span>
            <span class="jp-card-value">Canada</span>
        </div>
        
            </div>
        </section>
        

        <section class="jp-card">
            <h2 class="jp-card-title">Maya Chen</h2>
            <div class="jp-card-fields">
                
        <div class="jp-card-field">
            <span class="jp-card-key">Name</span>
            <span class="jp-card-value">Maya Chen</span>
        </div>
        

        <div class="jp-card-field">
            <span class="jp-card-key">Role</span>
            <span class="jp-card-value">AI Researcher</span>
        </div>
        

        <div class="jp-card-field">
            <span class="jp-card-key">Country</span>
            <span class="jp-card-value">Singapore</span>
        </div>
        
            </div>
        </section>
        
        </section>
        
    </main>
</body>
</html>
